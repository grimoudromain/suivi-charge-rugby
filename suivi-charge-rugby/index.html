<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Suivi charge rugby – Accueil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#f7f6f2;--surface:#fbfbf9;--border:#d8d4cc;--text:#22201b;--muted:#6e6b65;--primary:#0f6c73;--primary2:#d7ece9;--danger:#a13544;--radius:18px;--radius-sm:12px;--shadow:0 14px 32px rgba(0,0,0,.09)}*{box-sizing:border-box}html,body{margin:0;padding:0}body{font-family:Inter,system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center}.shell{max-width:480px;width:100%;padding:24px 18px}.card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);padding:20px 18px}h1{margin:4px 0 2px;font-size:1.6rem}p.muted{margin:4px 0 0;color:var(--muted);font-size:.9rem}.logo{width:42px;height:42px;border-radius:14px;display:grid;place-items:center;color:#fff;font-weight:800;margin-right:12px}.header{display:flex;align-items:center;margin-bottom:16px}.buttons{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}button{border-radius:var(--radius-sm);border:1px solid var(--border);padding:11px 14px;font:inherit;cursor:pointer;background:var(--primary2);color:var(--primary);font-weight:600}.secondary{background:var(--surface);color:var(--text)}.field{display:grid;gap:6px;margin-top:14px}.field label{font-size:.8rem;color:var(--muted)}.field input{padding:9px 10px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);font:inherit;color:var(--text)}.status{margin-top:6px;font-size:.8rem}.status.err{color:var(--danger)}
  </style>
</head>
<body>
  <div class="shell"><div class="card"><div class="header"><div class="logo"><img src="logo-club.png" alt="Logo du club" style="width:100%;height:100%;object-fit:contain;border-radius:inherit;"></div><div><h1>Suivi charge rugby</h1><p class="muted">Choisis ton accès : joueurs ou staff.</p></div></div><p class="muted">Les joueurs renseignent leur RPE et Hooper, le staff analyse la charge, la disponibilité et le bien-être.</p><div class="buttons"><button id="playerBtn">Accès joueurs</button><button id="staffBtn" class="secondary">Accès staff</button></div><div class="field" id="pinField" style="display:none;"><label for="staffPin">Code PIN staff</label><input type="password" id="staffPin" inputmode="numeric" /><div class="status" id="pinStatus"></div></div></div></div>
<script>
const STAFF_PIN='1234';
document.getElementById('playerBtn').addEventListener('click',()=>{window.location.href='app-joueurs-suivi-charge-rugby.2html.html'});
const staffBtn=document.getElementById('staffBtn'); const pinField=document.getElementById('pinField'); const pinInput=document.getElementById('staffPin'); const pinStatus=document.getElementById('pinStatus');
staffBtn.addEventListener('click',()=>{pinField.style.display='block'; pinInput.focus()});
pinInput.addEventListener('keyup',e=>{if(e.key==='Enter'){const val=pinInput.value.trim(); if(!val){pinStatus.textContent='Saisis le code PIN staff.'; pinStatus.className='status err'; return;} if(val===STAFF_PIN){pinStatus.textContent=''; window.location.href='app-suivi-charge-rugby-termine-3.html';} else {pinStatus.textContent='Code PIN incorrect.'; pinStatus.className='status err';}}});
</script>
</body>
</html>
